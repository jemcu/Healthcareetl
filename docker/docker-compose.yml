version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: healthanalytics
      POSTGRES_USER: healthanalytics
      POSTGRES_PASSWORD: healthanalytics
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  web:
    build: { context: .., dockerfile: docker/Dockerfile }
    environment:
      DATABASE_URL: postgres://healthanalytics:healthanalytics@db:5432/healthanalytics
      DJANGO_DEBUG: "True"
      SECRET_KEY: dev-secret
      ALLOWED_HOSTS: "*"
    depends_on: [db]
    ports: ["8000:8000"]

volumes: { pgdata: {} }
